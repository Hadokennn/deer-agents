# agents/oncall/agent.yaml
name: oncall
display_name: "Oncall 答疑助手"
description: "业务 oncall 答疑，连接告警平台和 runbook"

model: deepseek-v3
thinking_enabled: false

tool_groups:
  - web
  - file:read
  - file:write
  - bash
  # - oncall

subagent_enabled: true

mcp_servers:
  # bytedance-mcp-ace_ai (SSE) — configured in extensions_config.json
  # Provides: ace_ai_locate_template, ace_ai_get_last_template_detail, etc.

extra_middlewares:
  - use: middlewares.mcp_overflow:ToolResponseProcessorMiddleware
    config:
      max_response_size: 4096
      sandbox_path: /tmp/mcp_responses/
  - use: middlewares.code_index:CodeIndexMiddleware
    config:
      code_repos:
        - name: tobias-goods-mono
          path: /Users/bytedance/Documents/goods/fe_ls_tobias_goods_mono
  - use: middlewares.knowledge:KnowledgeMiddleware
    config:
      knowledge_path: agents/oncall/knowledge.json
      score_threshold: 7
      max_inject_patterns: 3
      extract_model: null
      max_extract_tokens: 8000

code_repos:
  - name: tobias-goods-mono
    path: /Users/bytedance/Documents/goods/fe_ls_tobias_goods_mono
    languages: [typescript, tsx]

knowledge_dirs:
  - ./agents/oncall/knowledge/

skills_dir: ./agents/oncall/skills/
skills:
  - schema-diagnosis
  - runbook-lookup

prompt: ./agents/oncall/prompt.md

memory:
  enabled: false

ptc_tools:
  - name: locate_template_schema
    purpose: >
      Use this when you need to locate a product template schema and
      extract field configuration. Chains locate_template (category →
      config dimension) and get_last_template_detail (dimension → full
      schema), then searches for a specific field. Returns the field's
      schema fragment including reaction_rules, validator_rules, and
      x-component info. Preferred over calling MCP tools individually.
    timeout_seconds: 60
    max_output_chars: 40000
    eligible_tools:
      - name: bytedance-mcp-ace_ai_ace_ai_locate_template
        output_schema:
          type: array
          items:
            type: object
            properties:
              config_dimension:
                type: object
                properties:
                  category_full_name: { type: string }
                  category_id: { type: string }
                  product_type: { type: string }
                  product_sub_type: { type: string }
                  template_type: { type: string }
                  template_sub_type: { type: string }
      - name: bytedance-mcp-ace_ai_ace_ai_get_last_template_detail
        output_schema:
          type: object
          properties:
            online_template:
              type: array
              items:
                type: object
                properties:
                  template_name: { type: string }
                  schema_config: { type: string, description: "JSON string of full template schema" }
                  attr_list: { type: array }